# 基于 synthetic_toy100 的 smoke 配置。
dataset:
  raw_root: "data/ny_state"
  sample_size: 100
  knn_k: 8
  ordering: "xy"
  split_mode: "county"
  heldout_counties: ["089"]
  val_counties: ["087"]
  num_train_samples: 16
  batch_size: 1

model:
  gps_layers: 4
  hidden_dim: 128
  heads: 4
  dropout: 0.1
  lap_pe_dim: 8
  rw_steps: 2
  pair_dim: 64
  latent_channels: 16
  diffusion_steps: 100

train:
  optimizer: "AdamW"
  lr_gravity: 0.001
  lr_pair_mlp: 0.0002
  lr_regressor: 0.0002
  lr_ae: 0.001
  lr_diffusion: 0.0002
  weight_decay: 0.0001
  epochs:
    gravity: 1
    pair_mlp: 10
    regressor: 10
    ae: 10
    diffusion: 10
  device: "auto"
  seed: 20260317

eval:
  threshold: 0.5
  top_k: 5
  distance_bins: [0, 2, 5, 10, 20, 40, 80, 160, 320]
  figures_dir: "artifacts/figures"
  metrics_path: "artifacts/metrics/toy_metrics.json"
