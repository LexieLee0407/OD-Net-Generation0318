dataset:
  raw_root: "data/ny_state"
  sample_size: 100
  knn_k: 8
  ordering: "xy"
  split_mode: "county"
  heldout_counties: ["061"]
  val_counties: ["047"]
  num_train_samples: 8
  batch_size: 1

model:
  gps_layers: 2
  hidden_dim: 64
  heads: 4
  dropout: 0.1
  lap_pe_dim: 8
  rw_steps: 2
  pair_dim: 32
  latent_channels: 16
  diffusion_steps: 20

train:
  optimizer: "AdamW"
  lr_gravity: 0.001
  lr_pair_mlp: 0.0002
  lr_regressor: 0.0002
  lr_ae: 0.001
  lr_diffusion: 0.0002
  weight_decay: 0.0001
  epochs: 2
  device: "cpu"
  seed: 20260317

eval:
  threshold: 0.0
  top_k: 5
  distance_bins: 6
  figures_dir: "artifacts/figures"
  metrics_path: "artifacts/metrics/smoke_metrics.json"

